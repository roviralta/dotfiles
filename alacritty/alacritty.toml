# ==========================================================
# Alacritty — Nordic Minimal Theme
# ==========================================================

[window]
decorations = "none"
opacity = 0.95
dynamic_padding = true

[window.padding]
x = 12
y = 12

[scrolling]
history = 10000
multiplier = 3

[font]
size = 12.5

[font.normal]
family = "JetBrains Mono"
style = "Regular"

[font.bold]
family = "JetBrains Mono"
style = "Bold"

[font.italic]
family = "JetBrains Mono"
style = "Italic"

[colors.primary]
background = "#2E3440"
foreground = "#D8DEE9"

[colors.cursor]
text = "#2E3440"
cursor = "#88C0D0"

[colors.selection]
text = "#ECEFF4"
background = "#4C566A"

[colors.normal]
black   = "#3B4252"
red     = "#BF616A"
green   = "#A3BE8C"
yellow  = "#EBCB8B"
blue    = "#81A1C1"
magenta = "#B48EAD"
cyan    = "#88C0D0"
white   = "#E5E9F0"

[colors.bright]
black   = "#4C566A"
red     = "#BF616A"
green   = "#A3BE8C"
yellow  = "#EBCB8B"
blue    = "#81A1C1"
magenta = "#B48EAD"
cyan    = "#8FBCBB"
white   = "#ECEFF4"

[cursor]
style.shape = "Beam"
style.blinking = "Off"
thickness = 0.15

[mouse]
hide_when_typing = true

[env]
TERM = "alacritty"
