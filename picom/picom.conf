#################################
# Picom — Nordic Balanced Setup
#################################

# -------------------------------
# Backend & performance
backend = "glx";
vsync = true;
use-damage = true;
detect-client-opacity = true;
detect-transient = true;
detect-rounded-corners = true;

# -------------------------------
# Shadows
shadow = true;
shadow-radius = 10;
shadow-opacity = 0.20;
shadow-offset-x = 0;
shadow-offset-y = 3;

shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'i3-frame'",
  "class_g = 'i3bar'",
  "class_g = 'Polybar'",
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "fullscreen"
];

# -------------------------------
# Fading
fading = true;
fade-in-step = 0.04;
fade-out-step = 0.04;
fade-delta = 10;

# -------------------------------
# Opacity
active-opacity = 1.0;
inactive-opacity = 0.92;
frame-opacity = 1.0;
inactive-dim = 0.0;

# -------------------------------
# Rounded corners
corner-radius = 10;

rounded-corners-exclude = [
  "class_g = 'Polybar'",
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "fullscreen"
];

# -------------------------------
# Blur disabled for performance/battery
blur-method = "none";

# -------------------------------
# Window types
wintypes:
{
  tooltip = { fade = true; shadow = true; opacity = 1.0; };
  dock = { shadow = false; };
  dnd = { shadow = false; };
  popup_menu = { shadow = true; opacity = 0.98; };
  dropdown_menu = { shadow = true; opacity = 0.98; };
};

# -------------------------------
# Focus fixes
mark-wmwin-focused = true;
mark-ovredir-focused = true;
