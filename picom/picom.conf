#################################
# Picom — Nordic Balanced Setup
#################################

# -------------------------------
# Backend & performance
backend = "glx";
vsync = true;
use-damage = true;
detect-client-opacity = true;
detect-transient = true;
detect-rounded-corners = true;

# -------------------------------
# Shadows (very subtle)
shadow = true;
shadow-radius = 8;
shadow-opacity = 0.25;
shadow-offset-x = -4;
shadow-offset-y = -4;
shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'i3-frame'",
  "class_g = 'i3bar'",
  "class_g = 'Polybar'",
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

# -------------------------------
# Fading (fast & clean)
fading = true;
fade-in-step = 0.04;
fade-out-step = 0.04;
fade-delta = 10;

# -------------------------------
# Opacity
active-opacity = 1.0;
inactive-opacity = 0.7;
frame-opacity = 1.0;
inactive-dim = 0.0;

# -------------------------------
# Rounded corners (very light)
corner-radius = 15;
rounded-corners-exclude = [
  "class_g = 'Polybar'",
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

# -------------------------------
# Blur (disabled for battery)
blur-method = "none";

# -------------------------------
# Window types
wintypes:
{
  tooltip = { fade = true; shadow = true; opacity = 1.0; };
  dock = { shadow = false; };
  dnd = { shadow = false; };
  popup_menu = { shadow = true; opacity = 0.95; };
  dropdown_menu = { shadow = true; opacity = 0.95; };
};

# -------------------------------
# Fixes
unredir-if-possible = false;
mark-wmwin-focused = true;
mark-ovredir-focused = true;

